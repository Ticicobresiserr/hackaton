<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: { 50:'#eff6ff',100:'#dbeafe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',900:'#1e3a5f' }}}}}</script>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center">
  <div class="w-full max-w-md mx-4">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white">TaskFlow</h1>
      <p class="text-gray-400 mt-2">Project management for modern teams</p>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">
      <h2 class="text-xl font-semibold text-white mb-6">Sign in to your account</h2>
      <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Email address</label>
          <input type="email" value="demo@taskflow.io" class="w-full rounded-lg bg-gray-800 border border-gray-700 px-4 py-2.5 text-sm text-gray-100 focus:outline-none focus:ring-2 focus:ring-brand-500">
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
          <input type="password" value="password123" class="w-full rounded-lg bg-gray-800 border border-gray-700 px-4 py-2.5 text-sm text-gray-100 focus:outline-none focus:ring-2 focus:ring-brand-500">
        </div>
        <button type="submit" class="w-full rounded-lg bg-brand-600 hover:bg-brand-500 px-4 py-2.5 text-sm font-semibold text-white transition-colors">
          Sign in
        </button>
      </form>
      <p class="text-center text-sm text-gray-500 mt-4">
        Don't have an account? <a href="dashboard.html" class="text-brand-500 hover:underline">Sign up free</a>
      </p>
    </div>
  </div>
<script src="http://localhost:3001/widget/sherpa-widget.js"></script>
</body>
</html>
