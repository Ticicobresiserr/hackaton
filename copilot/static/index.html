<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot - Training Guide</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #262626;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header .dot { width: 8px; height: 8px; border-radius: 50%; background: #525252; }
    header .dot.connected { background: #22c55e; }

    #flow-select {
      padding: 12px 24px;
      border-bottom: 1px solid #262626;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #flow-select select {
      background: #171717;
      color: #e5e5e5;
      border: 1px solid #404040;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      flex: 1;
      max-width: 400px;
    }
    #flow-select button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    #flow-select button:hover { background: #1d4ed8; }
    #flow-select button:disabled { background: #404040; cursor: not-allowed; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .msg.assistant {
      background: #1e293b;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg.user {
      background: #1e3a5f;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.system {
      background: #172717;
      align-self: center;
      font-size: 12px;
      color: #86efac;
      border-radius: 6px;
    }
    .msg.thinking {
      background: #262626;
      align-self: flex-start;
      color: #737373;
      font-style: italic;
    }

    #input-bar {
      padding: 16px 24px;
      border-top: 1px solid #262626;
      display: flex;
      gap: 12px;
    }
    #input-bar input {
      flex: 1;
      background: #171717;
      color: #e5e5e5;
      border: 1px solid #404040;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    #input-bar input:focus { border-color: #2563eb; }
    #input-bar button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    #input-bar button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <header>
    <div class="dot" id="status-dot"></div>
    <h1>Copilot</h1>
  </header>

  <div id="flow-select">
    <select id="flow-dropdown">
      <option value="">Cargando flows...</option>
    </select>
    <button id="start-btn" disabled>Empezar</button>
  </div>

  <div id="messages"></div>

  <div id="input-bar">
    <input type="text" id="msg-input" placeholder="Escribí un mensaje..." disabled />
    <button id="send-btn" disabled>Enviar</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const startBtn = document.getElementById('start-btn');
    const flowDropdown = document.getElementById('flow-dropdown');
    const statusDot = document.getElementById('status-dot');

    let ws = null;
    let flowStarted = false;

    function addMessage(text, type = 'assistant') {
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function removeThinking() {
      const thinking = messagesEl.querySelector('.msg.thinking');
      if (thinking) thinking.remove();
    }

    // Load available flows
    async function loadFlows() {
      try {
        const res = await fetch('/api/flows');
        const flows = await res.json();
        flowDropdown.innerHTML = '';
        if (flows.length === 0) {
          flowDropdown.innerHTML = '<option value="">No hay flows disponibles</option>';
          return;
        }
        flows.forEach(f => {
          const opt = document.createElement('option');
          opt.value = f.id;
          opt.textContent = f.name;
          flowDropdown.appendChild(opt);
        });
        startBtn.disabled = false;
      } catch (e) {
        flowDropdown.innerHTML = '<option value="">Error cargando flows</option>';
      }
    }

    // Connect WebSocket
    function connectWS() {
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}/ws/chat`);

      ws.onopen = () => {
        statusDot.classList.add('connected');
        console.log('WebSocket connected');
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        removeThinking();
        if (data.type === 'assistant') {
          addMessage(data.text, 'assistant');
        } else if (data.type === 'error') {
          addMessage(data.text, 'system');
        }
      };

      ws.onclose = () => {
        statusDot.classList.remove('connected');
        console.log('WebSocket disconnected');
        // Reconnect after 2s
        setTimeout(connectWS, 2000);
      };

      ws.onerror = (e) => {
        console.error('WebSocket error', e);
      };
    }

    // Start flow
    startBtn.addEventListener('click', () => {
      const flowId = flowDropdown.value;
      if (!flowId || !ws) return;

      ws.send(JSON.stringify({ type: 'start_flow', flowId }));
      addMessage(`Iniciando flow: ${flowDropdown.options[flowDropdown.selectedIndex].text}`, 'system');
      addMessage('Pensando...', 'thinking');

      flowStarted = true;
      inputEl.disabled = false;
      sendBtn.disabled = false;
      startBtn.disabled = true;
      flowDropdown.disabled = true;
      inputEl.focus();
    });

    // Send message
    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !ws) return;

      ws.send(JSON.stringify({ type: 'message', text }));
      addMessage(text, 'user');
      addMessage('Pensando...', 'thinking');
      inputEl.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Init
    loadFlows();
    connectWS();
  </script>
</body>
</html>
